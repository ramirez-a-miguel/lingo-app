services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lingo-tube-app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      MEDIA_STORAGE_DIR: /data/media
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - media:/data/media
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: lingo-tube-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  media:
  ollama:
